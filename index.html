<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Arraial da Ritinha - Caixa</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { color: #d35400; margin: 5px 0 2px 0; font-size: 22px; text-align: center; text-transform: uppercase; }
        .sub { color: #7f8c8d; margin-top: 0; margin-bottom: 12px; font-size: 13px; text-align: center; font-weight: bold;}
        
        .container {
            width: 100%;
            max-width: 480px;
            background: white;
            padding: 14px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            box-sizing: border-box;
        }

        .category-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #d35400;
            margin: 12px 0 4px 0;
            padding-bottom: 2px;
            border-bottom: 2px solid #f39c12;
            font-weight: bold;
        }
        
        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 8px;
            border-bottom: 1px solid #f5f5f5;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .item-info {
            flex-grow: 1;
            padding-right: 8px;
        }
        .item-name {
            font-weight: 600;
            font-size: 15px;
            color: #2c3e50;
        }
        .item-details {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 2px;
        }
        .badge-cor {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
        }
        
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-minus { background-color: #eaeded; color: #34495e; }
        .btn-plus { background-color: #2ecc71; color: white; }
        
        .qtd {
            font-size: 16px;
            font-weight: bold;
            min-width: 22px;
            text-align: center;
        }
        
        .total-box {
            margin-top: 14px;
            background: #d35400;
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        .total-box h3 { margin: 0; font-size: 13px; font-weight: normal; opacity: 0.9; }
        .total-val { font-size: 28px; font-weight: bold; margin-top: 2px; }
        
        /* Seletor de Pagamento */
        .pagamento-selector {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .radio-btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: #f4f6f7;
            border: 2px solid #bdc3c7;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #34495e;
        }
        .radio-btn.active {
            background: #f39c12;
            color: white;
            border-color: #e67e22;
        }

        .troco-box {
            margin-top: 10px;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .troco-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .input-pago {
            width: 110px;
            padding: 6px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid #ced4da;
            text-align: right;
        }
        
        #pix-box {
            display: none;
            text-align: center;
            margin-top: 10px;
            background: #fff;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }
        #pix-box img {
            width: 130px;
            height: 130px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .btn-action {
            flex: 1;
            border: none;
            padding: 14px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            color: white;
        }
        .btn-confirm { background-color: #27ae60; flex: 2; }
        .btn-clear { background-color: #95a5a6; }
        
        .section-expander {
            margin-top: 15px;
            border-top: 1px dashed #ccc;
            padding-top: 10px;
        }
        .expander-title {
            font-size: 13px;
            font-weight: bold;
            color: #7f8c8d;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            background: #f4f6f7;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 5px;
        }
        .expander-content {
            display: none;
            font-size: 13px;
            background: #fff;
            padding: 8px;
            border: 1px solid #f4f6f7;
            border-radius: 6px;
            max-height: 180px;
            overflow-y: auto;
        }
        .btn-cancel-last {
            background-color: #c0392b;
            color: white;
            border: none;
            padding: 6px 10px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .btn-reset-all {
            background-color: #7f8c8d;
            color: white;
            border: none;
            width: 100%;
            padding: 8px;
            font-size: 11px;
            border-radius: 4px;
            margin-top: 10px;
            cursor: pointer;
        }
        .relatorio-table { width: 100%; border-collapse: collapse; }
        .relatorio-table th, .relatorio-table td { text-align: left; padding: 5px 0; border-bottom: 1px solid #eee; }
        
        /* Layout de Impressão Corrigido e Ampliado */
        #comprovante-print { display: none; }

        @media print {
            .container, h2, .sub { display: none !important; }
            
            #comprovante-print { 
                display: block !important; 
                width: 100%; 
                max-width: 58mm; 
                font-family: monospace; 
                font-size: 14px; /* Aumentado de 11px para 14px (Letra maior) */
                color: #000;
                margin: 0;
                padding: 0;
            }
            .print-center { text-align: center; }
            .print-line { border-top: 2px dashed #000; margin: 8px 0; } /* Linha divisória mais marcante */
            
            /* Garante que o QR Code saia centralizado e visível na impressão */
            .print-qrcode {
                display: block;
                margin: 10px auto;
                width: 140px;
                height: 140px;
            }
        }
    </style>
</head>

<h2>⛪ Arraial da Ritinha ⛪</h2>
<p class="sub">Paróquia Santa Rita de Cássia</p>

<div class="container">
    <div id="lista-itens"></div>
    
    <div class="total-box">
        <h3>TOTAL A PAGAR</h3>
        <div class="total-val" id="total-geral">R$ 0,00</div>
    </div>

    <div class="pagamento-selector">
        <div id="tipo-dinheiro" class="radio-btn active" onclick="setFormaPagamento('ESPECIE')">💵 Dinheiro</div>
        <div id="tipo-pix" class="radio-btn" onclick="setFormaPagamento('PIX')">📱 PIX</div>
    </div>
    
    <div class="troco-box" id="dinheiro-box">
        <div class="troco-row">
            <label style="font-size: 13px; font-weight: bold; color: #495057;">Valor Recebido (R$):</label>
            <input type="number" id="valor-pago" class="input-pago" placeholder="0,00" min="0" step="0.01" inputmode="decimal" oninput="calcularTroco()">
        </div>
        <div class="troco-row" style="margin-top: 3px; border-top: 1px dashed #e9ecef; padding-top: 3px;">
            <label style="font-size: 13px; font-weight: bold; color: #495057;">Troco a Devolver:</label>
            <div id="valor-troco" style="font-size: 16px; font-weight: bold; color: #c0392b;">R$ 0,00</div>
        </div>
    </div>

            <button class="btn-cancel-last" onclick="cancelarUltimaVenda()">↩ Cancelar última venda</button>
            <div id="lista-historico" style="color: #555; line-height: 1.4;">Nenhum pedido realizado ainda.</div>
        </div>
    </div>

    <div class="section-expander">
        <div class="expander-title" onclick="toggleSection('relatorio-content'); atualizarRelatorio();">
            <span>📊 Fechamento do Caixa (Totalizador)</span>
            <span id="relatorio-seta">▶</span>
        </div>
        <div id="relatorio-content" class="expander-content">
            <table class="relatorio-table">
                <thead>
                    <tr><th>Item</th><th>Qtd</th><th>Total</th></tr>
                </thead>
                <tbody id="linhas-relatorio"></tbody>
            </table>
            <div style="font-weight: bold; color: #2c3e50; margin-top: 8px; font-size: 13px; text-align: right;" id="relatorio-total-geral">Geral: R$ 0,00</div>
            <button class="btn-reset-all" onclick="zerarCaixaDoDia()">⚠️ Zerar Caixa Geral da Noite</button>
        </div>
    </div>
</div>

<div id="comprovante-print"></div>

<script>
const DATA_FIXA = "11/07/2026";
const produtos = [
    { id: 1, categoria: "Comidas", nome: "Cachorro-quente", preco: 8.00, corFicha: "Vermelha", corHex: "#e53935" },
    { id: 2, categoria: "Comidas", nome: "Pastel", preco: 7.00, corFicha: "Amarela", corHex: "#fbc02d" },
    { id: 3, categoria: "Comidas", nome: "Pipoca", preco: 4.00, corFicha: "Azul", corHex: "#1e88e5" },
    { id: 4, categoria: "Comidas", nome: "Fatias de bolo", preco: 6.00, corFicha: "Rosa", corHex: "#ec407a" },
    { id: 5, categoria: "Comidas", nome: "Canjica", preco: 6.00, corFicha: "Verde", corHex: "#43a047" },
    { id: 6, categoria: "Comidas", nome: "Milho cozido", preco: 5.00, corFicha: "Branca", corHex: "#9e9e9e" },
    { id: 7, categoria: "Bebidas", nome: "Refrigerante", preco: 6.00, corFicha: "Azul Escuro", corHex: "#0d47a1" },
    { id: 8, categoria: "Bebidas", nome: "Água", preco: 4.00, corFicha: "Preto/Prata", corHex: "#34495e" }
];

let carrinho = {};
let vendasAcumuladas = JSON.parse(localStorage.getItem('vendasAcumuladas')) || {};
let historicoPedidos = JSON.parse(localStorage.getItem('historicoPedidos')) || [];
let numVendaSequencial = parseInt(localStorage.getItem('numVendaSequencial')) || 1; 
let totalPedido = 0;
let formaPagamento = "ESPECIE";

produtos.forEach(p => {
    carrinho[p.id] = 0;
    if (vendasAcumuladas[p.id] === undefined) vendasAcumuladas[p.id] = 0;
});

function renderizarItens() {
    const divLista = document.getElementById('lista-itens');
    divLista.innerHTML = '';
    let categoryAtual = "";
    
    produtos.forEach(p => {
        if (p.categoria !== categoryAtual) {
            categoryAtual = p.categoria;
            const catHeader = document.createElement('div');
            catHeader.className = 'category-title';
            catHeader.innerText = categoryAtual;
            divLista.appendChild(catHeader);
        }
        
        const qtd = carrinho[p.id];
        const row = document.createElement('div');
        row.className = 'item-row';
        if (qtd > 0) row.style.backgroundColor = '#f5fff5';
        
        row.innerHTML = `
            <div class="item-info">
                <div class="item-name">${p.nome}</div>
                <div class="item-details">
                    R$ ${p.preco.toFixed(2).replace('.', ',')} | 
                    <span class="badge-cor" style="background-color: ${p.corHex}">${p.corFicha}</span>
                    ${qtd > 0 ? ` | <b>${qtd} ficha(s)</b>` : ''}
                </div>
            </div>
            <div class="controls">
                <button class="btn btn-minus" onclick="alterarQtd(${p.id}, -1)">−</button>
                <span class="qtd">${qtd}</span>
                <button class="btn btn-plus" onclick="alterarQtd(${p.id}, 1)">+</button>
            </div>
        `;
        divLista.appendChild(row);
    });
    calcularTotal();
}

function alterarQtd(id, valor) {
    if (carrinho[id] + valor >= 0) {
        carrinho[id] += valor;
        renderizarItens();
    }
}

function calcularTotal() {
    totalPedido = 0;
    produtos.forEach(p => { totalPedido += carrinho[p.id] * p.preco; });
    document.getElementById('total-geral').innerText = `R$ ${totalPedido.toFixed(2).replace('.', ',')}`;
    calcularTroco();
}

function setFormaPagamento(tipo) {
    formaPagamento = tipo;
    document.getElementById('tipo-dinheiro').className = `radio-btn ${tipo === 'ESPECIE' ? 'active' : ''}`;
    document.getElementById('tipo-pix').className = `radio-btn ${tipo === 'PIX' ? 'active' : ''}`;
    document.getElementById('dinheiro-box').style.display = tipo === 'ESPECIE' ? 'flex' : 'none';
    document.getElementById('pix-box').style.display = tipo === 'PIX' ? 'block' : 'none';
    calcularTroco();
}

function calcularTroco() {
    if (formaPagamento === "PIX") return;
    const valorPagoInput = document.getElementById('valor-pago').value;
    const valorPago = parseFloat(valorPagoInput) || 0;
    const trocoElemento = document.getElementById('valor-troco');
    
    if (valorPago === 0 || totalPedido === 0) {
        trocoElemento.innerText = "R$ 0,00";
        trocoElemento.style.color = "#c0392b";
        return;
    }
    
    const troco = valorPago - totalPedido;
    if (troco < 0) {
        trocoElemento.innerText = `Faltam R$ ${Math.abs(troco).toFixed(2).replace('.', ',')}`;
        trocoElemento.style.color = "#c0392b";
    } else {
        trocoElemento.innerText = `R$ ${troco.toFixed(2).replace('.', ',')}`;
        trocoElemento.style.color = "#2e7d32";
    }
}

function limparCarrinho() {
    produtos.forEach(p => carrinho[p.id] = 0);
    document.getElementById('valor-pago').value = '';
    setFormaPagamento('ESPECIE');
    renderizarItens();
}

function finalizarVenda() {
    if (totalPedido === 0) {
        alert("Adicione itens ao pedido antes de finalizar!");
        return;
    }
    
    const valorPagoInput = document.getElementById('valor-pago').value;
    const valorPago = parseFloat(valorPagoInput) || 0;
    const troco = valorPago - totalPedido;
    
    if (formaPagamento === 'ESPECIE' && valorPago < totalPedido) {
        alert("Valor recebido é menor do que o total da conta!");
        return;
    }

    const agora = new Date();
    const horaFormatada = agora.toTimeString().split(' ')[0];
    const numFormatado = String(numVendaSequencial).padStart(4, '0');
    
    let resumoItensPrint = "";
    let resumoItensHistorico = [];
    let pedidoObjeto = { num: numFormatado, hora: horaFormatada, pagamento: formaPagamento, total: totalPedido, itens: [] };

    produtos.forEach(p => {
        if (carrinho[p.id] > 0) {
            vendasAcumuladas[p.id] += carrinho[p.id];
            resumoItensPrint += `${carrinho[p.id]}x ${p.nome.padEnd(18)} R$ ${(carrinho[p.id]*p.preco).toFixed(2).replace('.', ',')}\n`;
            resumoItensHistorico.push(`${carrinho[p.id]}x ${p.nome}`);
            pedidoObjeto.itens.push({ id: p.id, qtd: carrinho[p.id], nome: p.nome });
        }
    });

    pedidoObjeto.resumoTexto = `<b>Venda nº ${numFormatado}</b> | ${horaFormatada} | ${formaPagamento} | <b>R$ ${totalPedido.toFixed(2).replace('.', ',')}</b><br><small style="color:#7f8c8d">${resumoItensHistorico.join(', ')}</small>`;
    historicoPedidos.unshift(pedidoObjeto);
    numVendaSequencial++;

    localStorage.setItem('vendasAcumuladas', JSON.stringify(vendasAcumuladas));
    localStorage.setItem('historicoPedidos', JSON.stringify(historicoPedidos));
    localStorage.setItem('numVendaSequencial', numVendaSequencial.toString());

    // Gerar Cupom de Impressão com QR Code e fontes maiores
    // Pegamos o código exato da imagem que você salvou no campo PIX do aplicativo
    const qrCodeAtual = document.querySelector('#pix-box img').src;

    let cupomHTML = `
<div class="print-center" style="font-size: 15px; font-weight: bold;">
⛪ ARRAIAL DA RITINHA<br>Paróquia Santa Rita de Cássia<br>
</div>
<div class="print-center">
${DATA_FIXA}<br>Venda nº ${numFormatado}<br>
${DATA_FIXA} - ${horaFormatada}
</div>
<div class="print-line"></div>
<pre style="margin:0; font-family:monospace; font-size:14px;">${resumoItensPrint}</pre>
<div class="print-line"></div>
<pre style="margin:0; font-family:monospace; font-size:15px; font-weight:bold;">TOTAL:            R$ ${totalPedido.toFixed(2).replace('.', ',')}</pre>
<div class="print-line"></div>
<div style="font-size:13px;">
PAGAMENTO: ${formaPagamento}<br>
${formaPagamento === 'ESPECIE' ? `Recebido: R$ ${valorPago.toFixed(2).replace('.', ',')}<br>Troco: R$ ${troco.toFixed(2).replace('.', ',')}` : 'Valor Pago: R$ ' + totalPedido.toFixed(2).replace('.', ',')}
</div>
${formaPagamento === 'PIX' ? `
<div class="print-line"></div>
<div class="print-center" style="font-size:11px; font-weight:bold;">COMPROVANTE PIX</div>
<img src="${qrCodeAtual}" class="print-qrcode">
` : ''}
<div class="print-line"></div>
<div class="print-center" style="font-size:12px;">
Obrigado pela sua colaboração!<br>Arraial da Ritinha 2026<br>Paróquia Santa Rita de Cássia
</div>`;	
    
    document.getElementById('comprovante-print').innerHTML = cupomHTML;
    renderizarHistorico();
    window.print();
    limparCarrinho();
}

function renderizarHistorico() {
    const divHist = document.getElementById('lista-historico');
    if (historicoPedidos.length === 0) {
        divHist.innerHTML = "Nenhum pedido realizado ainda.";
        return;
    }
    divHist.innerHTML = historicoPedidos.map(p => p.resumoTexto).join('<div style="border-bottom:1px solid #eee; margin:6px 0;"></div>');
}

function cancelarUltimaVenda() {
    if (historicoPedidos.length === 0) {
        alert("Nenhuma venda para cancelar!");
        return;
    }
    const ultimaVenda = historicoPedidos[0];
    if (confirm(`Deseja realmente CANCELAR a Venda nº ${ultimaVenda.num}? Os valores serão estornados do caixa.`)) {
        ultimaVenda.itens.forEach(item => {
            vendasAcumuladas[item.id] = Math.max(0, vendasAcumuladas[item.id] - item.qtd);
        });
        historicoPedidos.shift();
        localStorage.setItem('vendasAcumuladas', JSON.stringify(vendasAcumuladas));
        localStorage.setItem('historicoPedidos', JSON.stringify(historicoPedidos));
        renderizarHistorico();
        atualizarRelatorio();
        alert("Venda cancelada e estornada com sucesso!");
    }
}

function atualizarRelatorio() {
    const tbody = document.getElementById('linhas-relatorio');
    tbody.innerHTML = '';
    let faturamentoGeral = 0;
    
    produtos.forEach(p => {
        const qtdVendida = vendasAcumuladas[p.id] || 0;
        const subtotal = qtdVendida * p.preco;
        faturamentoGeral += subtotal;
        
        if(qtdVendida > 0) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${p.nome}</td><td>${qtdVendida}</td><td>R$ ${subtotal.toFixed(2).replace('.', ',')}</td>`;
            tbody.appendChild(tr);
        }
    });
    
    if(tbody.innerHTML === '') {
        tbody.innerHTML = `<tr><td colspan="3" style="color:#7f8c8d; font-style:italic;">Nenhuma ficha vendida ainda.</td></tr>`;
    }
    document.getElementById('relatorio-total-geral').innerText = `Geral: R$ ${faturamentoGeral.toFixed(2).replace('.', ',')}`;
}

function zerarCaixaDoDia() {
    if (confirm("⚠️ ATENÇÃO: Isso irá zerar TODAS as vendas e o histórico da quermesse inteira! Tem certeza que deseja limpar tudo para um novo dia?")) {
        localStorage.clear();
        vendasAcumuladas = {};
        historicoPedidos = [];
        numVendaSequencial = 1;
        produtos.forEach(p => vendasAcumuladas[p.id] = 0);
        limparCarrinho();
        renderizarHistorico();
        atualizarRelatorio();
        alert("Caixa zerado com sucesso! Pronto para o novo dia.");
    }
}

function toggleSection(id) {
    const content = document.getElementById(id);
    const seta = document.getElementById(id.replace('content', 'seta'));
    if (content.style.display === "block") {
        content.style.display = "none";
        seta.innerText = "▶";
    } else {
        content.style.display = "block";
        seta.innerText = "▼";
    }
}

renderizarItens();
renderizarHistorico();
</script>
</body>
</html>
